name: Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "conda_broker/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "tests/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "conda_broker/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: dev
      - name: Lint
        run: pixi run -e dev lint
      - name: Format check
        run: pixi run -e dev format-check
      - name: Type check
        run: pixi run -e dev typecheck

  tests:
    name: ${{ matrix.os }}, Python 3.${{ matrix.python-minor }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-minor: ["10", "11", "12", "13", "14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: test-py3${{ matrix.python-minor }}
      - name: Run tests
        run: pixi run -e test-py3${{ matrix.python-minor }} test
